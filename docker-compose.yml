version: '3'

# Local development compose file.
# Requires a .env file at the repo root with all variables defined.
# The .env file is gitignored — copy from .env.example or populate manually.

services:
  backend:
    build:
      context: ./backend/nexus
    environment:
      - APP_ENV=dev
      - ENVIRONMENT=${ENVIRONMENT}
      - MONGODB_URL=${MONGODB_URL}
      - DATABASE_NAME=${DATABASE_NAME}
      - SERVER_ORIGIN=${SERVER_ORIGIN}
      - CLIENT_ORIGIN=${CLIENT_ORIGIN}
      - ACCESS_TOKEN_EXPIRES_IN=${ACCESS_TOKEN_EXPIRES_IN}
      - REFRESH_TOKEN_EXPIRES_IN=${REFRESH_TOKEN_EXPIRES_IN}
      - JWT_ALGORITHM=${JWT_ALGORITHM}
      - ACCESS_TOKEN_SECRET=${ACCESS_TOKEN_SECRET}
      - REFRESH_TOKEN_SECRET=${REFRESH_TOKEN_SECRET}
      - SMTP_SERVER_ADDRESS=${SMTP_SERVER_ADDRESS}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SENDER_EMAIL=${SENDER_EMAIL}
      - CLIENT_ID=${CLIENT_ID}
      - CLIENT_SECRET=${CLIENT_SECRET}
      - IHMS_DB_USER=${IHMS_DB_USER}
      - IHMS_DB_PASS=${IHMS_DB_PASS}
      - IHMS_DB_HOST=${IHMS_DB_HOST}
      - IHMS_DB_PORT=${IHMS_DB_PORT}
      - IHMS_DB_NAME=${IHMS_DB_NAME}
    expose:
      - "8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend/nexus
    environment:
      - VITE_APP_ENV=${VITE_APP_ENV}
      - VITE_API_URL_PROD=${VITE_API_URL_PROD}
      - VITE_API_URL_DEV=${VITE_API_URL_DEV}
    expose:
      - "3000"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
